# restaurant.yaml - 飲食店業界プリセット
# gem-research industry モード用

preset:
  name: restaurant
  display_name: 飲食店
  description: レストラン・カフェ・居酒屋・飲食チェーン向けGemリサーチプリセット
  version: "1.0"

seed_keywords:
  primary:
    - 飲食店
    - レストラン
    - カフェ
    - 居酒屋
    - 食堂
  secondary:
    - ランチ
    - ディナー
    - テイクアウト
    - デリバリー
    - 予約
    - メニュー
    - 食材
    - 料理
  long_tail:
    - 飲食店 集客 方法
    - レストラン 予約 増やす
    - カフェ SNS 集客
    - 飲食店 リピーター 増やす
  english:
    - restaurant
    - cafe
    - food business

persona:
  primary:
    age_range: "25-50"
    gender: 男女均等
    concerns:
      - 集客が安定しない
      - リピーターが増えない
      - 食材コストが上がっている
      - スタッフ不足
      - SNS運用がわからない
    motivations:
      - 売上を伸ばしたい
      - 口コミを増やしたい
      - 新規顧客を獲得したい
      - 業務を効率化したい
    barriers:
      - 時間がない
      - ITに詳しくない
      - コストをかけられない
      - 何から始めればいいかわからない
    information_sources:
      - 食べログ
      - Googleマップ
      - Instagram
      - 飲食業界メディア

competitors:
  market:
    - name: 食べログ
      type: プラットフォーム
    - name: ぐるなび
      type: プラットフォーム
    - name: Retty
      type: プラットフォーム
    - name: Uber Eats
      type: デリバリー
  ai_search_hints:
    - "飲食店 GPTs ChatGPT メニュー開発"
    - "レストラン AI 予約管理"
    - "飲食店 AI 接客"

hashtags:
  instagram:
    mega: ["#グルメ", "#ランチ", "#カフェ巡り", "#食べスタグラム"]
    large: ["#おうちごはん", "#飲食店", "#レストラン", "#居酒屋"]
    medium: ["#地域名グルメ", "#新メニュー", "#期間限定"]
    niche: ["#店名", "#地域名ランチ"]
  tiktok: ["#グルメ", "#飲食店", "#ランチ", "#食べ歩き", "#バズグルメ"]
  youtube: ["#グルメ", "#料理", "#レストラン", "#飲食店経営"]

marketing_hints:
  effective_content:
    - 料理写真・動画
    - メニュー紹介
    - シェフ・スタッフ紹介
    - お客様の声
    - 食材へのこだわり
  seasonal_topics:
    - 春: 歓送迎会プラン・春メニュー
    - 夏: ビアガーデン・冷製メニュー
    - 秋: 旬の食材フェア・収穫祭
    - 冬: 忘年会/新年会プラン・鍋メニュー
  pricing:
    market_range: "800-5,000円（ランチ〜ディナー）"
    sweet_spot: "1,000-2,000円（ランチ）"
