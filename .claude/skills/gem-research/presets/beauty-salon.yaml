# beauty-salon.yaml - 美容サロン業界プリセット
# gem-research industry モード用

preset:
  name: beauty-salon
  display_name: 美容サロン
  description: 美容室・ヘアサロン・エステサロン向けGemリサーチプリセット
  version: "1.0"

seed_keywords:
  primary:
    - 美容サロン
    - 美容室
    - ヘアサロン
    - エステ
    - ネイルサロン
  secondary:
    - カット
    - カラー
    - パーマ
    - トリートメント
    - ヘッドスパ
    - 縮毛矯正
    - ヘアケア
    - 頭皮ケア
  long_tail:
    - 美容室 予約 当日
    - 美容室 おすすめ 近く
    - ヘアカラー 色落ち 防ぐ
    - 似合う 髪型 診断
  english:
    - beauty salon
    - hair salon
    - hair stylist

persona:
  primary:
    age_range: "25-45"
    gender: 女性中心
    concerns:
      - 髪の悩み（パサつき・うねり・ボリューム）
      - 似合う髪型がわからない
      - カラーの色落ちが早い
      - サロン選びで失敗したくない
    motivations:
      - キレイになりたい
      - 自分に自信を持ちたい
      - 特別な日に備えたい
      - 定期的なメンテナンス
    barriers:
      - 価格が高い
      - 予約が取りにくい
      - 担当者との相性が不安
      - イメージ通りにならない不安
    information_sources:
      - Instagram
      - ホットペッパービューティー
      - 友人の紹介
      - Google Maps レビュー

competitors:
  market:
    - name: ホットペッパービューティー
      type: プラットフォーム
    - name: minimo
      type: アプリ
    - name: 楽天ビューティ
      type: プラットフォーム
  ai_search_hints:
    - "美容室 GPTs ChatGPT おすすめ"
    - "ヘアスタイル AI 診断"
    - "パーソナルカラー AI"

hashtags:
  instagram:
    mega: ["#美容室", "#ヘアスタイル", "#ヘアカラー", "#ヘアアレンジ"]
    large: ["#トリートメント", "#ヘッドスパ", "#カラーリング"]
    medium: ["#似合わせカット", "#透明感カラー", "#韓国ヘア", "#インナーカラー"]
    niche: ["#地域名美容室", "#スタイリスト名"]
  tiktok: ["#美容室", "#ヘアチェンジ", "#ビフォーアフター", "#韓国ヘア"]
  youtube: ["#ヘアカット", "#セルフヘアケア", "#美容師"]

marketing_hints:
  effective_content:
    - ビフォーアフター写真
    - スタイリスト紹介
    - ヘアケアTips
    - お客様の声
  seasonal_topics:
    - 春: 新生活ヘアチェンジ
    - 夏: 紫外線ヘアケア・涼しげスタイル
    - 秋: 秋カラー・ヘアケア強化
    - 冬: 乾燥対策・イベントヘア
  pricing:
    market_range: "3,000-15,000円"
    sweet_spot: "5,000-8,000円"
