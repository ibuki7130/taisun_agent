persona:
  primary:
    age_range: "30-55"
    gender: 男女均等
    concerns:
      - クライアント獲得が難しい
      - 価格設定に悩む
      - 差別化ができない
      - 集客チャネルがわからない
      - セッション品質を上げたい
    motivations:
      - もっと多くの人を助けたい
      - 安定した収入を得たい
      - 自分のメソッドを広めたい
      - オンラインでスケールしたい
    barriers:
      - マーケティングが苦手
      - テクノロジーに不慣れ
      - 実績がまだ少ない
      - 無形サービスの価値を伝えにくい
    information_sources:
      - note
      - Instagram
      - YouTube
      - セミナー/勉強会
      - コーチング団体

competitors:
  market:
    - name: ストアカ
      type: プラットフォーム
    - name: ココナラ
      type: スキルマーケット
    - name: タイムチケット
