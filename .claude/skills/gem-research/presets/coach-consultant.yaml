  version: "1.0"

seed_keywords:
  primary:
    - コーチング
    - コンサルタント
    - カウンセリング
    - セラピスト
    - メンター
  secondary:
    - 個別相談
    - セッション
    - 目標達成
    - 自己実現
    - ビジネス相談
    - キャリア相談
    - 起業支援
    - マインドセット
  long_tail:
