# ec-shop.yaml - EC・ネットショップ業界プリセット
# gem-research industry モード用

preset:
  name: ec-shop
  display_name: EC・ネットショップ
  description: ECサイト・ネットショップ・D2Cブランド向けGemリサーチプリセット
  version: "1.0"

seed_keywords:
  primary:
    - ECサイト
    - ネットショップ
    - オンラインストア
    - D2C
    - 通販
  secondary:
    - 商品ページ
    - カート
    - 決済
    - 配送
    - レビュー
    - リピート購入
    - 定期便
    - セール
  long_tail:
    - ECサイト 集客 方法
    - ネットショップ 売上 伸ばす
    - EC 転換率 改善
    - D2C ブランド 立ち上げ
  english:
    - e-commerce
    - online store
    - D2C brand
    - dropshipping

persona:
  primary:
    age_range: "25-50"
    gender: 男女均等
    concerns:
      - 集客コストが高い
      - 転換率（CVR）が低い
      - カート放棄が多い
      - リピート率が上がらない
      - 競合との価格競争
    motivations:
      - 売上を伸ばしたい
      - ブランドを育てたい
      - 新規顧客を獲得したい
      - LTV（顧客生涯価値）を上げたい
    barriers:
      - 広告費が高い
      - SEOに時間がかかる
      - 写真/動画制作が大変
      - 在庫管理が難しい
    information_sources:
      - EC業界メディア
      - YouTube
      - note
      - Shopifyコミュニティ
      - Twitter/X

competitors:
  market:
    - name: Amazon
      type: マーケットプレイス
    - name: 楽天市場
      type: マーケットプレイス
    - name: Shopify
      type: ECプラットフォーム
    - name: BASE
      type: ECプラットフォーム
    - name: STORES
      type: ECプラットフォーム
  ai_search_hints:
    - "ECサイト GPTs ChatGPT 商品説明 自動生成"
    - "ネットショップ AI 接客 チャットボット"
    - "EC AI レコメンド パーソナライズ"

hashtags:
  instagram:
    mega: ["#ネットショップ", "#通販", "#お取り寄せ", "#オンラインショップ"]
    large: ["#ECサイト", "#D2C", "#ハンドメイド販売", "#新商品"]
    medium: ["#Shopify", "#BASE", "#STORES", "#EC運営"]
    niche: ["#ブランド名", "#商品カテゴリ名"]
  tiktok: ["#通販", "#ネットショップ", "#おすすめ商品", "#購入品紹介"]
  youtube: ["#EC運営", "#ネットショップ", "#Shopify", "#物販"]

marketing_hints:
  effective_content:
    - 商品レビュー動画
    - 使い方・活用法
    - 開封動画（Unboxing）
    - お客様の声
    - 製造過程・こだわり
    - セール・キャンペーン告知
  seasonal_topics:
    - 春: 新生活応援セール・母の日
    - 夏: サマーセール・お中元
    - 秋: ハロウィン・ブラックフライデー
    - 冬: クリスマス・年末年始セール・お歳暮
  pricing:
    market_range: "カテゴリ依存"
    sweet_spot: "送料無料ライン設定が重要"
